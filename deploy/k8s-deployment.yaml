# Pangolinfo VOC MCP Server — Kubernetes Deployment (阿里云 ACK)
#
# 集群: crawler @ ap-southeast-1 (新加坡), default namespace
# 使用方式: ACK 控制台 -> 工作负载 -> 无状态 -> 「使用 YAML 创建」 -> 整段贴入
#
# 镜像: registry-intl.ap-southeast-1.aliyuncs.com/pangolinfo-prod/datascaler-voc:0.3.3
# 端口: 3000 (HTTP, /mcp 协议端点 + /health 探针)
# 多租户: API key 通过每次请求的 ?api_key= 或 Authorization 头传入,不存集群侧
#
# 对外方式: 与 pangolinfo-mcp 同款 —— 下方 Service 用 type: LoadBalancer,
#           ACK 自动创建并管理一个独立 SLB(新公网 IP),自签证书 cert-id 挂 annotation。
#           不与 pangolinfo-mcp 抢 SLB(各自一个,互不影响)。
apiVersion: apps/v1
kind: Deployment
metadata:
  name: datascaler-voc
  namespace: default
  labels:
    app: datascaler-voc
    component: mcp-server
spec:
  replicas: 2  # 双副本起步,流量来了再 HPA 自动扩
  selector:
    matchLabels:
      app: datascaler-voc
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # 滚动更新时不中断服务
  template:
    metadata:
      labels:
        app: datascaler-voc
        component: mcp-server
    spec:
      containers:
        - name: mcp-server
          image: registry-intl.ap-southeast-1.aliyuncs.com/pangolinfo-prod/datascaler-voc:0.4.1
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: PANGOLINFO_TRANSPORT
              value: "http"
            # Pin public endpoint to English tool descriptions (catalogs
            # scan tools/list here). Local stdio users keep zh via $LANG.
            - name: PANGOLINFO_LANG
              value: "en"
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"
            # 本 MCP 转发到同一个 Pangolinfo 后端(/api/v1/social/*)。
            # 如果后端在同集群,可改指向 svc 内网名免公网回环:
            # - name: PANGOLINFO_SCRAPE_BASE
            #   value: "http://<backend-svc>.default.svc.cluster.local:8080"
            #
            # 默认走公网(与 pangolinfo-mcp 一致):
            - name: PANGOLINFO_SCRAPE_BASE
              value: "https://scrapeapi.pangolinfo.com"
          resources:
            requests:
              cpu: "100m"     # 0.1 核基线
              memory: "128Mi"
            limits:
              cpu: "1000m"    # 1 核上限(单进程 node 用不完)
              memory: "512Mi"
          # liveness: 容器是否活着 — 死了 kubelet 重启它
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # readiness: 是否准备好接流量 — 没好就从 Service endpoint 摘掉
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          # graceful shutdown: SIGTERM 后 server.ts 有 drain 窗口
          terminationGracePeriodSeconds: 15
---
# Service: type=LoadBalancer,ACK 自动建一个独立 SLB 暴露到公网。
# 与 pangolinfo-mcp 的 Service 同款(截图确认 pangolinfo-mcp 也是 LoadBalancer)。
# 不指定 loadbalancer-id → ACK 自动新建一个专属 SLB,不与 pangolinfo-mcp 共用。
apiVersion: v1
kind: Service
metadata:
  name: datascaler-voc
  namespace: default
  labels:
    app: datascaler-voc
  annotations:
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-spec: "slb.s1.small"
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-address-type: "internet"
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-charge-type: "paybytraffic"
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-force-override-listeners: "true"
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-protocol-port: "http:80,https:443"
    # 复用与 pangolinfo-mcp 同一个自签证书(SAN 含 *.pangolinfo.com,覆盖 voc.pangolinfo.com)。
    # cert-id 见内部运维记录;若日后换证书在此改。
    service.beta.kubernetes.io/alibaba-cloud-loadbalancer-cert-id: "5913110905705115_19e5480e331_497479873_291766890"
spec:
  type: LoadBalancer
  selector:
    app: datascaler-voc
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
    - name: https
      port: 443
      targetPort: 3000
      protocol: TCP
  externalTrafficPolicy: Cluster
---
# HorizontalPodAutoscaler: CPU 用满 70% 时自动扩到 5 副本
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: datascaler-voc
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: datascaler-voc
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
